name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ lolik123Sw/calorie-counter}}

jobs:
  # ===== ЗАДАНИЕ 1: Сборка и тесты =====
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Type check
      run: npx tsc --noEmit

    - name: Build frontend
      run: npm run build

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
        retention-days: 1

  # ===== ЗАДАНИЕ 2: Сборка и публикация Docker-образа =====
  build-and-push-image:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # ===== ЗАДАНИЕ 3: Деплой с помощью Ansible =====
  deploy:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install Ansible
      run: pip install ansible

    - name: Create inventory file
      run: |
        cat > inventory.ini << EOF
        [webservers]
        ${{ secrets.DEPLOY_HOST }} ansible_user=${{ secrets.DEPLOY_USER }} ansible_ssh_private_key_file=/tmp/deploy_key ansible_host_key_checking=False
        EOF

    - name: Setup SSH key
      run: |
        echo "${{ secrets.DEPLOY_SSH_KEY }}" > /tmp/deploy_key
        chmod 600 /tmp/deploy_key

    - name: Run Ansible playbook
      run: |
        ansible-playbook -i inventory.ini deploy.yml \
          --extra-vars "registry=${{ env.REGISTRY }}" \
          --extra-vars "image_name=${{ env.IMAGE_NAME }}" \
          -e "ansible_ssh_private_key_file=/tmp/deploy_key" \
          -e "ansible_host_key_checking=False"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}